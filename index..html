<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Happy Birthday</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
  }

  body {
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
  }

  .card {
    z-index: 10;
    padding: 20px;
    width: 90%;
    max-width: 400px;
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }

  h1 {
    font-size: 2.2rem;
    color: white;
  }

  h2 {
    margin-top: 10px;
    color: #fff;
    font-size: 1.2rem;
    font-weight: normal;
  }

  p {
    color: white;
    margin-top: 10px;
  }

  .btn {
    margin-top: 20px;
    padding: 12px 20px;
    border: none;
    border-radius: 30px;
    background: #ff4081;
    color: white;
    font-size: 16px;
    cursor: pointer;
  }

  .btn:hover {
    background: #e91e63;
  }

  canvas {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
  }
</style>
</head>

<body>

<canvas id="confetti"></canvas>

<!-- 🎵 Birthday Song -->
<audio id="birthdaySong" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<div class="card">
  <h1>🎉 Happy Birthday 🎉</h1>
  <h2>Ms. Swikriti Poudel</h2>

  <p>Wishing you joy, love, and endless happiness! 🎂</p>

  <button class="btn" onclick="startCelebration()">Celebrate 🎊</button>
</div>

<script>
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let pieces = [];

function randomColor() {
  const colors = ["#ff0a54", "#ff477e", "#ff85a1", "#fbb1bd", "#f9bec7"];
  return colors[Math.floor(Math.random() * colors.length)];
}

function createPiece() {
  return {
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height - canvas.height,
    w: 8,
    h: 12,
    color: randomColor(),
    speed: Math.random() * 3 + 2
  };
}

for (let i = 0; i < 150; i++) {
  pieces.push(createPiece());
}

function update() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  pieces.forEach(p => {
    p.y += p.speed;
    if (p.y > canvas.height) {
      p.y = -10;
      p.x = Math.random() * canvas.width;
    }

    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, p.w, p.h);
  });

  requestAnimationFrame(update);
}

function startCelebration() {
  // 🎵 Play music
  const song = document.getElementById("birthdaySong");
  song.play();

  // 🎊 Start confetti
  update();
}

// Auto start confetti + music attempt
window.onload = () => {
  update();
  document.getElementById("birthdaySong").play().catch(() => {
    // Mobile browsers block autoplay sound until interaction
    console.log("Tap button to play music");
  });
};

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
